<div class="story-page">
	<header>
		<svg width="200" height="600" viewBox="0 0 200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
			<path d="M0 15 C 5 15 15 5 15 0 L 185 0 C 185 5 195 15 200 15 L 200 585 C 195 585 185 595 185 600 L 15 600 C 15 595 5 585 0 585 Z" stroke="#C5A45E" stroke-width="2" />
			<path d="M5 20 C 10 20 20 10 20 5 L 180 5 C 180 10 190 20 195 20 L 195 580 C 190 580 180 590 180 595 L 20 595 C 20 590 10 580 5 580 Z" stroke="#C5A45E" stroke-width="1" />
		</svg>
		<svg viewBox="0 0 200 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
			<defs>
				<linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
					<stop offset="0%" style="stop-color: #fee6a8; stop-opacity: 1" />
					<stop offset="50%" style="stop-color: #d4af37; stop-opacity: 1" />
					<stop offset="100%" style="stop-color: #8a6d3b; stop-opacity: 1" />
				</linearGradient>
			</defs>

			<text x="100" y="50" fill="url(#goldGradient)" onclick="document.location.assign('/');">Master's</text>
			<text x="100" y="75" fill="url(#goldGradient)" onclick="document.location.assign('/');">Navigation</text>
			<text x="100" y="170" fill="url(#goldGradient)" data-bind="click : function() { displayedSection('Writing'); }">
				Technical
			</text>
			<text x="100" y="220" fill="url(#goldGradient)" data-bind="click : function() { displayedSection('Writing') }">
				Creative
			</text>
			<text x="100" y="270" fill="url(#goldGradient)" data-bind="click : function() { displayedSection('Writing') }">
				About
			</text>
		</svg>
	</header>
	<section>
		<div>
			<img class="writing-header" src="/images/writing-header.svg" />
			<svg class="pageHeader" width="1000" height="10" viewBox="0 0 1000 10" fill="none" xmlns="http://www.w3.org/2000/svg">
				<defs>
					<linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
						<stop offset="0%" style="stop-color: #fee6a8; stop-opacity: 1" />
						<stop offset="50%" style="stop-color: #d4af37; stop-opacity: 1" />
						<stop offset="100%" style="stop-color: #8a6d3b; stop-opacity: 1" />
					</linearGradient>
				</defs>
				<line x1="-10" y1="5" x2="1010" y2="6" stroke="url(#goldGradient)" stroke-width="5" />
			</svg>
			<div class="content">
				<img class="frame" data-bind="attr : { src : story().frameImage }" />
				<img class="title" data-bind="attr : { src : story().titleImage }" />
				<div class="story-text" data-bind="html : storyHTML()" />
			</div>
		</div>
	</section>
</div>
