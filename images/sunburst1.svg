<svg viewBox="0 0 800 150"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color: #fee6a8; stop-opacity: 1" />
            <stop offset="50%" style="stop-color: #d4af37; stop-opacity: 1" />
            <stop offset="100%" style="stop-color: #8a6d3b; stop-opacity: 1" />
        </linearGradient>
    </defs>

    <rect x="0" y="0" width="100%" height="66%" fill="transparent" />
    <rect x="0" y="66%" width="100%" height="34%" fill="#1A1F2B" />
    <line x1="0" y1="100" x2="800" y2="101" stroke="url(#goldGradient)" stroke-width="2" />

    <g transform="translate(400, 100)" stroke="url(#goldGradient)" stroke-width="1.5" fill="none">
        <circle r="42" stroke-width="2" fill="#2E3443" />
        <circle r="36" />
        <circle r="8" fill="url(#goldGradient)" stroke="none" />

        <g id="blades">
            <path d="M 0,-8 L 0,-36 M -5.6,-5.6 L -25.4,-25.4 M -8,0 L -36,0 M -5.6,5.6 L -25.4,25.4 M 0,8 L 0,36 M 5.6,5.6 L 25.4,25.4 M 8,0 L 36,0 M 5.6,-5.6 L 25.4,-25.4" stroke-width="1" />
            <path d="M 0,-36 L -18,-31 M -25.4,-25.4 L -35,-10 M -36,0 L -31,18 M -25.4,25.4 L -10,35 M 0,36 L 18,31 M 25.4,25.4 L 35,10 M 36,0 L 31,-18 M 25.4,-25.4 L 10,-35" opacity="0.8" />
        </g>

        <g id="side-elements">
            <g id="wing">
                <path d="M 50,0 L 70,-15 L 140,-15 L 155,0 L 140,15 L 70,15 Z" fill="#2E3443" stroke-width="2" />
                <path d="M 75,0 L 90,-8 L 130,-8 L 140,0 L 130,8 L 90,8 Z" />
            </g>

            <use href="#wing" transform="scale(-1, 1)" />
        </g>
    </g>
</svg>